<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gribtract benchmark dashboard — __GIT_SHA__</title>
<style>
  body{font-family:system-ui,sans-serif;margin:0;padding:1rem 2rem;background:#0d1117;color:#c9d1d9}
  h1{color:#58a6ff;font-size:1.4rem;margin-bottom:0.25rem}
  .meta{color:#8b949e;font-size:0.8rem;margin-bottom:1.5rem}
  h2{color:#58a6ff;font-size:1rem;border-bottom:1px solid #21262d;padding-bottom:0.25rem;margin-top:1.5rem}
  table{border-collapse:collapse;width:100%;margin-top:0.5rem}
  th{background:#161b22;color:#8b949e;text-align:left;padding:6px 10px;font-size:0.75rem;font-weight:600;letter-spacing:0.05em}
  td{padding:6px 10px;font-size:0.85rem;border-top:1px solid #21262d}
  .green{color:#3fb950}.red{color:#f85149}.amber{color:#d29922}
  .badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:0.75rem;font-weight:600}
  .badge-green{background:#1a4226;color:#3fb950}.badge-red{background:#3d1c1c;color:#f85149}
  canvas{background:#161b22;border-radius:6px;margin-top:0.5rem;display:block}
  .row{display:flex;gap:1rem;flex-wrap:wrap}
  .card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:1rem;flex:1;min-width:220px}
  .big-num{font-size:2rem;font-weight:700;color:#58a6ff;line-height:1.1}
  .big-label{font-size:0.75rem;color:#8b949e;margin-top:4px}
</style>
</head>
<body>
<h1>gribtract benchmark dashboard</h1>
<div class="meta">commit: __GIT_SHA__ &nbsp;&middot;&nbsp; generated by <code>xtask bench</code></div>

<script>
const BENCH = __BENCH_JSON__;
const HISTORY = [__HISTORY_CSV__];
</script>

<div id="headline" class="row"></div>
<h2>Full-grid decode throughput</h2>
<table id="full-grid-table">
  <thead><tr><th>Template</th><th>Decoder</th><th>MB/s</th><th>Messages/s</th><th>Grid pts/s</th><th>Wall ms</th><th>Agreement</th></tr></thead>
  <tbody id="full-grid-body"></tbody>
</table>

<h2>Station-extract throughput</h2>
<table id="station-table">
  <thead><tr><th>Mode</th><th>Stations</th><th>Fields</th><th>In-range</th><th>Station-hours/s</th><th>Wall ms</th><th>Agreement</th></tr></thead>
  <tbody id="station-body"></tbody>
</table>

<h2>Throughput history (MB/s, full-grid)</h2>
<canvas id="history-chart" width="900" height="180"></canvas>

<script>
(function() {
  var runs = BENCH.runs || [];

  // Headline cards
  var headline = document.getElementById('headline');
  var fullGrid = runs.filter(function(r) { return !r.workload || r.workload === 'full-grid'; });
  var stationNearest = runs.filter(function(r) { return r.workload === 'station-extract' && r.interpolation === 'nearest'; });

  if (fullGrid.length > 0) {
    var best = fullGrid.reduce(function(a, b) { return (b.mb_per_sec||0) > (a.mb_per_sec||0) ? b : a; }, fullGrid[0]);
    var agr = best.agreement != null ? (best.agreement*100).toFixed(1)+'%' : 'n/a';
    var cls = best.agreement >= 1.0 ? 'badge-green' : 'badge-red';
    headline.innerHTML += '<div class="card"><div class="big-num">'+Math.round(best.mb_per_sec||0)+'</div>'
      +'<div class="big-label">MB/s (full-grid, '+(best.template_5x||'?')+')</div>'
      +'<div style="margin-top:8px"><span class="badge '+cls+'">'+agr+' agreement</span></div></div>';
  }

  if (stationNearest.length > 0) {
    var sr = stationNearest[0];
    var agrS = sr.agreement != null ? (sr.agreement*100).toFixed(1)+'%' : 'n/a';
    var clsS = sr.agreement >= 1.0 ? 'badge-green' : 'badge-red';
    var inr = sr.in_range || 0;
    headline.innerHTML += '<div class="card"><div class="big-num">'+Math.round(sr.station_hours_per_sec||0)+'</div>'
      +'<div class="big-label">station-hours/s (nearest, '+inr+' in-range)</div>'
      +'<div style="margin-top:8px"><span class="badge '+clsS+'">'+agrS+' agreement</span></div></div>';
  }

  // Full-grid table
  var fgBody = document.getElementById('full-grid-body');
  fullGrid.forEach(function(r) {
    var agr = r.agreement != null ? (r.agreement*100).toFixed(1)+'%' : 'n/a';
    var cls = r.agreement >= 1.0 ? 'green' : 'red';
    fgBody.innerHTML += '<tr><td>'+(r.template_5x||'?')+'</td><td>'+r.decoder+'</td>'
      +'<td>'+(r.mb_per_sec||0).toFixed(1)+'</td>'
      +'<td>'+(r.messages_per_sec||0).toFixed(0)+'</td>'
      +'<td>'+(r.grid_points_per_sec||0).toFixed(0)+'</td>'
      +'<td>'+(r.wall_ms||0).toFixed(3)+'</td>'
      +'<td class="'+cls+'">'+agr+'</td></tr>';
  });

  // Station table
  var stBody = document.getElementById('station-body');
  runs.filter(function(r) { return r.workload === 'station-extract'; }).forEach(function(r) {
    var agr = r.agreement != null ? (r.agreement*100).toFixed(1)+'%' : 'n/a';
    var cls = r.agreement >= 1.0 ? 'green' : (r.agreement >= 0.99 ? 'amber' : 'red');
    var inr = r.in_range != null ? r.in_range : 0;
    stBody.innerHTML += '<tr><td>'+(r.interpolation||'?')+'</td><td>'+(r.n_stations||0)+'</td>'
      +'<td>'+(r.n_fields||0)+'</td><td>'+inr+'</td>'
      +'<td>'+(r.station_hours_per_sec||0).toFixed(0)+'</td>'
      +'<td>'+(r.wall_ms||0).toFixed(3)+'</td>'
      +'<td class="'+cls+'">'+agr+'</td></tr>';
  });

  // History chart
  var canvas = document.getElementById('history-chart');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var PAD = {l:50, r:20, t:10, b:30};

  var points = [];
  HISTORY.forEach(function(h, hi) {
    var fg = (h.runs||[]).filter(function(r) { return !r.workload || r.workload === 'full-grid'; });
    fg.forEach(function(r) { points.push({x: hi, y: r.mb_per_sec||0, sha: (h.git_sha||'').slice(0,7)}); });
  });

  if (points.length > 0) {
    var maxY = Math.max.apply(null, points.map(function(p) { return p.y; })) * 1.15 || 1;
    var maxX = Math.max(1, points.length - 1);

    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 1;
    for (var i = 0; i <= 4; i++) {
      var y = PAD.t + (H - PAD.t - PAD.b) * (1 - i/4);
      ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(W - PAD.r, y); ctx.stroke();
      ctx.fillStyle = '#8b949e'; ctx.font = '11px system-ui';
      ctx.fillText((maxY * i / 4).toFixed(0), 2, y+4);
    }

    ctx.strokeStyle = '#58a6ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    points.forEach(function(p, i) {
      var px = PAD.l + (p.x / maxX) * (W - PAD.l - PAD.r);
      var py = PAD.t + (H - PAD.t - PAD.b) * (1 - p.y / maxY);
      if (i === 0) { ctx.moveTo(px, py); } else { ctx.lineTo(px, py); }
    });
    ctx.stroke();

    ctx.fillStyle = '#58a6ff';
    points.forEach(function(p) {
      var px = PAD.l + (p.x / maxX) * (W - PAD.l - PAD.r);
      var py = PAD.t + (H - PAD.t - PAD.b) * (1 - p.y / maxY);
      ctx.beginPath(); ctx.arc(px, py, 4, 0, 2*Math.PI); ctx.fill();
    });

    ctx.fillStyle = '#8b949e'; ctx.font = '11px system-ui';
    ctx.fillText('MB/s', PAD.l + 4, PAD.t + 12);
  } else {
    ctx.fillStyle = '#8b949e'; ctx.font = '14px system-ui';
    ctx.fillText('No history data yet — run xtask bench to populate', 60, H/2);
  }
}());
</script>
</body>
</html>
